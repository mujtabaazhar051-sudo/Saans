  <style>
    .tips-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 28px 80px;
    }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 18px;
      margin-bottom: 24px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-bar:focus-within {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,122,74,.1);
    }
    .search-icon { color: var(--ink-3); font-size: 1rem; flex-shrink: 0; }
    .search-input {
      flex: 1; border: none; outline: none;
      font-size: 0.92rem; font-family: inherit;
      background: transparent; color: var(--ink);
      min-width: 0;
    }
    .search-input::placeholder { color: var(--ink-3); }
    .search-clear {
      background: var(--green-lt); border: none;
      color: var(--green); cursor: pointer;
      font-size: 0.78rem; font-weight: 600;
      padding: 3px 10px; border-radius: 999px;
      font-family: var(--font-en);
      transition: background var(--transition);
      display: none;
    }
    .search-clear.show { display: inline-block; }
    .search-clear:hover { background: var(--green); color: white; }

    /* ===== FILTER CHIPS ===== */
    .filter-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .chip {
      border: 1px solid var(--border);
      background: white;
      color: var(--ink-2);
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 5px;
    }
    .chip:hover { border-color: var(--green-mid); color: var(--green); background: var(--green-xlt); }
    .chip.active { background: var(--green); color: white; border-color: var(--green); }

    /* ===== BLOCK TITLE ===== */
    .block-title {
      font-family: var(--font-disp);
      font-size: 1.2rem; color: var(--ink);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ===== TIPS GRID ===== */
    .tips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .tip-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 18px;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .tip-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .tip-card::before {
      content: "";
      position: absolute; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--teal));
    }
    .tip-card.hidden { display: none; }

    .tip-cat-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.7rem; font-weight: 600;
      padding: 3px 10px; border-radius: 999px;
      margin-bottom: 10px;
      font-family: var(--font-en);
      letter-spacing: 0.04em;
    }
    .tip-title {
      font-size: 0.95rem; font-weight: 700;
      color: var(--ink); margin-bottom: 6px; line-height: 1.4;
    }
    .tip-body {
      font-size: 0.83rem; color: var(--ink-2);
      line-height: 1.65;
    }

    /* Category badge colours */
    .cat-craving  { background: #fde8e8; color: #c0392b; }
    .cat-diet     { background: #e8f5ee; color: var(--green); }
    .cat-exercise { background: #e8f0ff; color: #3a5fc5; }
    .cat-sleep    { background: #f3eeff; color: #7c4dbc; }
    .cat-mind     { background: #fff3e0; color: #b8760a; }
    .cat-social   { background: #e0f7fa; color: #00838f; }

    /* No results */
    .no-results {
      text-align: center; padding: 48px 20px;
      color: var(--ink-3); display: none;
      grid-column: 1 / -1;
    }
    .no-results.show { display: block; }
    .no-results .nr-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }

    /* ===== TIMELINE ===== */
    .timeline { position: relative; padding-right: 28px; }
    .en-mode .timeline { padding-right: 0; padding-left: 28px; }

    /* Vertical line */
    .timeline::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0; right: 10px;
      width: 2px; background: var(--border);
    }
    .en-mode .timeline::before { right: auto; left: 10px; }

    .tl-group { margin-bottom: 32px; }

    .tl-period {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px; position: relative;
    }
    .tl-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--green); border: 3px solid white;
      box-shadow: 0 0 0 2px var(--green);
      flex-shrink: 0;
      position: absolute;
      right: -39px;
    }
    .en-mode .tl-dot { right: auto; left: -39px; }

    .tl-period-label {
      font-family: var(--font-disp);
      font-size: 1.05rem; color: var(--green);
      font-weight: 700;
    }
    .tl-period-sub { font-size: 0.78rem; color: var(--ink-3); }

    .tl-tips {
      display: flex; flex-direction: column; gap: 10px;
    }
    .tl-tip {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex; gap: 12px; align-items: flex-start;
      transition: box-shadow var(--transition);
    }
    .tl-tip:hover { box-shadow: var(--shadow-sm); }
    .tl-tip-icon {
      font-size: 1.3rem; flex-shrink: 0; margin-top: 1px;
    }
    .tl-tip-text { flex: 1; }
    .tl-tip-title { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
    .tl-tip-body  { font-size: 0.8rem; color: var(--ink-2); line-height: 1.55; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .tips-wrap { padding: 28px 16px 60px; }
      .tips-grid { grid-template-columns: 1fr; }
      .timeline { padding-right: 20px; }
      .en-mode .timeline { padding-right: 0; padding-left: 20px; }
      .tl-dot { right: -31px; }
      .en-mode .tl-dot { right: auto; left: -31px; }
    }

    /* ===== TRIGGER-MATCHED TIP ===== */
    .tip-card.trigger-match {
      border-color: var(--accent);
      background: linear-gradient(135deg, #fff8ed, #fffbf5);
    }
    .tip-card.trigger-match::before {
      background: linear-gradient(90deg, var(--accent), #f0c060);
    }
    .trigger-match-tag {
      display: inline-block;
      background: rgba(244,161,46,.15);
      color: #8a5c0a;
      font-size: 0.68rem; font-weight: 700;
      padding: 2px 9px; border-radius: 999px;
      margin-bottom: 8px;
      font-family: var(--font-en);
    }

    /* ===== TRIGGERS BANNER ===== */
    .triggers-banner {
      background: linear-gradient(135deg, #fff8ed, #fffbf5);
      border: 1px solid #f0d89a;
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 20px;
      display: none;
      align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .triggers-banner.show { display: flex; }
    .tb-icon { font-size: 1.3rem; flex-shrink: 0; }
    .tb-text { flex: 1; min-width: 160px; }
    .tb-text strong { font-size: 0.85rem; color: #8a5c0a; display: block; margin-bottom: 3px; }
    .tb-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .tb-chip  { background: rgba(244,161,46,.2); color: #8a5c0a;
      font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
    .en-mode .triggers-banner { direction: ltr; }

  </style>

    /* ===== TRIGGER MATCHING ===== */
    // Maps trigger strings to tip categories for smart highlighting
    const TRIGGER_CAT_MAP = {
      // Urdu triggers
      'صبح اٹھ کر':       'craving',
      'کھانے کے بعد':     'diet',
      'چائے کے ساتھ':     'diet',
      'ذہنی دباؤ میں':    'mind',
      'دوستوں کے ساتھ':   'social',
      'فارغ وقت میں':     'craving',
      'گاڑی چلاتے':       'craving',
      'شراب کے ساتھ':     'social',
      'کام کے بعد':       'exercise',
      'خوشی میں':         'craving',
      // English triggers
      'First thing in morning': 'craving',
      'After meals':            'diet',
      'With tea/coffee':        'diet',
      'When stressed':          'mind',
      'With friends':           'social',
      'When bored':             'craving',
      'While driving':          'craving',
      'After work':             'exercise',
      'When happy':             'craving',
      'Late at night':          'sleep',
    };

    function showTriggersBanner(lang) {
      const triggers = LS.get('triggers', []);
      const banner   = document.getElementById('triggersBanner');
      const chipsEl  = document.getElementById('tbChips');
      const titleEl  = document.getElementById('tbTitle');

      if (!triggers.length) { banner.classList.remove('show'); return; }

      titleEl.textContent = lang === 'ur'
        ? 'آپ کے محرکات کے مطابق مشورے نمایاں ہیں ⬇️'
        : 'Tips highlighted based on your triggers ⬇️';

      chipsEl.innerHTML = '';
      triggers.slice(0, 5).forEach(tr => {
        const chip = document.createElement('span');
        chip.className = 'tb-chip';
        chip.textContent = tr;
        chipsEl.appendChild(chip);
      });
      banner.classList.add('show');
    }

    function getTriggerMatchedCats() {
      const triggers = LS.get('triggers', []);
      const cats = new Set();
      triggers.forEach(tr => { if (TRIGGER_CAT_MAP[tr]) cats.add(TRIGGER_CAT_MAP[tr]); });
      return cats;
    }

    /* ===== STATE ===== */
    let activeCat  = 'all';
    let searchQuery = '';
    let currentLang = 'ur';

    /* ===== RENDER CHIPS ===== */
    function renderChips(lang) {
      const c    = PG[lang];
      const wrap = document.getElementById('filterChips');
      wrap.innerHTML = '';

      // All chip
      const allChip = document.createElement('button');
      allChip.className = 'chip' + (activeCat === 'all' ? ' active' : '');
      allChip.textContent = c.allChip;
      allChip.addEventListener('click', () => { activeCat = 'all'; renderChips(lang); renderTips(lang); });
      wrap.appendChild(allChip);

      c.cats.forEach(cat => {
        const chip = document.createElement('button');
        chip.className = 'chip' + (activeCat === cat.key ? ' active' : '');
        chip.innerHTML = `${cat.icon} ${cat.label}`;
        chip.addEventListener('click', () => {
          activeCat = cat.key;
          renderChips(lang);
          renderTips(lang);
        });
        wrap.appendChild(chip);
      });
    }

    /* ===== RENDER TIPS GRID ===== */
    function renderTips(lang) {
      const c    = PG[lang];
      const grid = document.getElementById('tipsGrid');

      // Remove old tip cards (keep no-results div)
      grid.querySelectorAll('.tip-card').forEach(el => el.remove());

      const catMap = {};
      c.cats.forEach(cat => { catMap[cat.key] = cat; });

      let visibleCount = 0;

      c.tips.forEach(tip => {
        const matchCat    = activeCat === 'all' || tip.cat === activeCat;
        const matchSearch = !searchQuery ||
          tip.title.toLowerCase().includes(searchQuery) ||
          tip.body.toLowerCase().includes(searchQuery);

        const card = document.createElement('div');
        card.className = 'tip-card' + ((!matchCat || !matchSearch) ? ' hidden' : '');

        const catInfo = catMap[tip.cat] || { label: tip.cat, cls: 'cat-craving' };
        const matchedCats = getTriggerMatchedCats();
        const isTriggerMatch = matchedCats.has(tip.cat) && !searchQuery && activeCat === 'all';
        if (isTriggerMatch) card.classList.add('trigger-match');
        const matchTag = isTriggerMatch
          ? `<span class="trigger-match-tag">${lang === 'ur' ? '⚡ آپ کے محرک سے متعلق' : '⚡ Matches your trigger'}</span><br>`
          : '';
        card.innerHTML = `
          ${matchTag}<span class="tip-cat-badge ${catInfo.cls}">${catInfo.icon} ${catInfo.label}</span>
          <div class="tip-title">${tip.icon ? tip.icon + ' ' : ''}${tip.title}</div>
          <div class="tip-body">${tip.body}</div>
        `;
        grid.appendChild(card);
        if (matchCat && matchSearch) visibleCount++;
      });

      const noRes = document.getElementById('noResults');
      noRes.classList.toggle('show', visibleCount === 0);
      document.getElementById('noResultsText').textContent = c.noResultsText;
    }

    /* ===== RENDER TIMELINE ===== */
    function renderTimeline(lang) {
      const c    = PG[lang];
      const wrap = document.getElementById('timeline');
      wrap.innerHTML = '';

      c.timeline.forEach(group => {
        const grp = document.createElement('div');
        grp.className = 'tl-group';

        const periodEl = document.createElement('div');
        periodEl.className = 'tl-period';
        periodEl.innerHTML = `
          <div class="tl-dot"></div>
          <div>
            <div class="tl-period-label">${group.period}</div>
            <div class="tl-period-sub">${group.sub}</div>
          </div>
        `;
        grp.appendChild(periodEl);

        const tipsEl = document.createElement('div');
        tipsEl.className = 'tl-tips';
        group.tips.forEach(tip => {
          const t = document.createElement('div');
          t.className = 'tl-tip';
          t.innerHTML = `
            <div class="tl-tip-icon">${tip.icon}</div>
            <div class="tl-tip-text">
              <div class="tl-tip-title">${tip.title}</div>
              <div class="tl-tip-body">${tip.body}</div>
            </div>
          `;
          tipsEl.appendChild(t);
        });
        grp.appendChild(tipsEl);
        wrap.appendChild(grp);
      });
    }

    /* ===== SEARCH ===== */
    document.getElementById('searchInput').addEventListener('input', function() {
      searchQuery = this.value.toLowerCase().trim();
      const clearBtn = document.getElementById('searchClear');
      clearBtn.classList.toggle('show', searchQuery.length > 0);
      renderTips(currentLang);
    });

    document.getElementById('searchClear').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      searchQuery = '';
      document.getElementById('searchClear').classList.remove('show');
      renderTips(currentLang);
    });

    /* ===== APPLY TRANSLATIONS ===== */
    function applyTranslations(lang) {
      currentLang = lang;
      const c   = PG[lang];
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

      set('backBtn', c.backBtn);
      set('pageBadge', c.pageBadge);
      set('pageTitle', c.pageTitle);
      set('pageSubtitle', c.pageSubtitle);
      set('catTitle', c.catTitle);
      set('tlTitle', c.tlTitle);
      set('searchClear', c.searchClear);

      const inp = document.getElementById('searchInput');
      if (inp) inp.placeholder = c.searchPlaceholder;

      activeCat = 'all';
      searchQuery = '';
      document.getElementById('searchInput').value = '';
      document.getElementById('searchClear').classList.remove('show');

      renderChips(lang);
      renderTips(lang);
      renderTimeline(lang);
      showTriggersBanner(lang);
    }

    /* ===== INIT ===== */
    initNavScroll();
    initReveal();
    initLang(applyTranslations);
  </script>
