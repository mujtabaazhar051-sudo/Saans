<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سانس — لاگ ان</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a7a4a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="سانس">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* ===== FULL PAGE LAYOUT ===== */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0d3d26 0%, #1a5e3a 50%, #0d6e5e 100%);
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ===== LANG TOGGLE (top right) ===== */
    .login-lang {
      position: fixed; top: 18px; left: 18px;
      z-index: 100;
    }
    .en-mode .login-lang { left: auto; right: 18px; }
    .lang-pill {
      display: flex; background: rgba(255,255,255,.15);
      border-radius: 999px; padding: 3px; gap: 2px;
      border: 1px solid rgba(255,255,255,.2);
    }
    .lang-btn {
      border: none; background: transparent;
      padding: 5px 14px; border-radius: 999px;
      font-size: 0.82rem; font-weight: 500;
      cursor: pointer; color: rgba(255,255,255,.8);
      font-family: inherit;
      transition: background var(--transition), color var(--transition);
    }
    .lang-btn.active { background: white; color: var(--green); }

    /* ===== CARD ===== */
    .login-card {
      background: white;
      border-radius: var(--radius-lg);
      width: 100%; max-width: 420px;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      position: relative; z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    /* Card top */
    .login-top {
      background: linear-gradient(135deg, var(--green-xlt), #edf7f2);
      padding: 32px 28px 24px;
      text-align: center;
      border-bottom: 1px solid #b8dfc8;
    }
    .login-logo {
      font-family: var(--font-disp);
      font-size: 2rem; color: var(--green);
      margin-bottom: 6px;
    }
    .login-logo span { color: var(--accent); }
    .login-tagline {
      font-size: 0.85rem; color: var(--ink-2); line-height: 1.5;
    }

    /* Tab switcher */
    .login-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .login-tab {
      flex: 1; padding: 14px;
      text-align: center;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; color: var(--ink-3);
      border: none; background: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: all var(--transition);
    }
    .login-tab.active {
      color: var(--green);
      border-bottom-color: var(--green);
      background: var(--green-xlt);
    }

    /* Card body */
    .login-body { padding: 24px 28px 28px; }

    /* Panels */
    .login-panel { display: none; flex-direction: column; gap: 14px; }
    .login-panel.active { display: flex; }

    /* Form fields */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.82rem; font-weight: 600; color: var(--ink-2); }
    .form-input {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      font-size: 0.92rem; font-family: inherit;
      color: var(--ink); background: var(--bg);
      outline: none; width: 100%;
      transition: border-color var(--transition), box-shadow var(--transition);
      direction: ltr; text-align: left;
    }
    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,122,74,.1);
      background: white;
    }

    /* Buttons */
    .btn-email {
      background: var(--green); color: white;
      border: none; padding: 13px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit;
      width: 100%;
      transition: background var(--transition), transform var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-email:hover { background: var(--teal); transform: translateY(-1px); }
    .btn-email:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    .btn-google {
      background: white; color: #3c4043;
      border: 1px solid #dadce0;
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 0.92rem; font-weight: 600;
      cursor: pointer; font-family: var(--font-en);
      width: 100%;
      transition: background var(--transition), box-shadow var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      direction: ltr;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: var(--shadow-sm); }
    .google-icon {
      width: 20px; height: 20px; flex-shrink: 0;
    }

    /* Divider */
    .or-divider {
      display: flex; align-items: center; gap: 10px;
      color: var(--ink-3); font-size: 0.78rem;
    }
    .or-divider::before, .or-divider::after {
      content: ""; flex: 1; height: 1px; background: var(--border);
    }

    /* Forgot + toggle links */
    .forgot-link {
      font-size: 0.78rem; color: var(--green);
      cursor: pointer; text-align: center;
      background: none; border: none;
      font-family: inherit; text-decoration: underline;
    }
    .forgot-link:hover { color: var(--teal); }

    /* Error / success messages */
    .auth-msg {
      padding: 10px 14px; border-radius: var(--radius-sm);
      font-size: 0.82rem; line-height: 1.5;
      display: none;
    }
    .auth-msg.show { display: block; }
    .auth-msg.error   { background: #fde8e8; color: #c0392b; border: 1px solid #f5c0bb; }
    .auth-msg.success { background: var(--green-lt); color: var(--green); border: 1px solid #b8dfc8; }

    /* Loading spinner */
    .btn-spinner {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      animation: spin 0.7s linear infinite;
      display: none; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Already logged in card */
    .logged-in-card {
      text-align: center; padding: 8px 0;
    }
    .li-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      margin: 0 auto 12px;
      background: var(--green-lt);
      border: 3px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; overflow: hidden;
    }
    .li-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .li-name  { font-family: var(--font-disp); font-size: 1.2rem; color: var(--ink); margin-bottom: 4px; }
    .li-email { font-size: 0.8rem; color: var(--ink-3); font-family: var(--font-en); margin-bottom: 20px; }
    .li-btns  { display: flex; gap: 10px; flex-direction: column; }
    .btn-continue {
      background: var(--green); color: white;
      border: none; padding: 13px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; font-family: inherit; width: 100%;
      transition: background var(--transition);
      text-decoration: none; display: block; text-align: center;
    }
    .btn-continue:hover { background: var(--teal); }
    .btn-signout {
      background: none; color: var(--danger);
      border: 1px solid #f5c0bb; padding: 10px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; font-family: inherit; width: 100%;
      transition: background var(--transition);
    }
    .btn-signout:hover { background: #fde8e8; }

    /* Footer note */
    .login-footer {
      text-align: center; padding: 0 28px 20px;
      font-size: 0.72rem; color: var(--ink-3); line-height: 1.6;
    }
    .login-footer a { color: var(--green); }

    /* Responsive */
    @media (max-width: 440px) {
      .login-card { border-radius: var(--radius-md); }
      .login-body { padding: 20px 18px 22px; }
      .login-top  { padding: 24px 18px 18px; }
    }
  </style>

</head>
<body>

  <!-- Lang toggle -->
  <div class="login-lang">
    <div class="lang-pill">
      <button class="lang-btn active" id="btn-ur">اردو</button>
      <button class="lang-btn" id="btn-en">English</button>
    </div>
  </div>

  <!-- Login card -->
  <div class="login-card" id="loginCard">

    <!-- Top -->
    <div class="login-top">
      <div class="login-logo">سانس<span>•</span></div>
      <div class="login-tagline" id="loginTagline">سگریٹ چھوڑیں — زندگی اپنائیں</div>
    </div>

    <!-- Already logged in view -->
    <div class="login-body" id="loggedInView" style="display:none;">
      <div class="logged-in-card">
        <div class="li-avatar" id="liAvatar">👤</div>
        <div class="li-name"  id="liName">—</div>
        <div class="li-email" id="liEmail">—</div>
        <div class="li-btns">
          <a href="app.html" class="btn-continue" id="liContinueBtn">ایپ پر جائیں</a>
          <button class="btn-signout" id="liSignoutBtn" onclick="handleSignOut()">لاگ آؤٹ</button>
        </div>
      </div>
    </div>

    <!-- Auth view -->
    <div id="authView">
      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabLogin" onclick="switchTab('login')">
          <span id="tabLoginLabel">لاگ ان</span>
        </button>
        <button class="login-tab" id="tabSignup" onclick="switchTab('signup')">
          <span id="tabSignupLabel">اکاؤنٹ بنائیں</span>
        </button>
      </div>

      <div class="login-body">

        <!-- Error / success msg -->
        <div class="auth-msg" id="authMsg"></div>

        <!-- LOGIN panel -->
        <div class="login-panel active" id="panelLogin">
          <div class="form-group">
            <label class="form-label" id="lblLoginEmail">ای میل</label>
            <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" id="lblLoginPw">پاس ورڈ</label>
            <input type="password" class="form-input" id="loginPw" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="btn-email" id="loginBtn" onclick="handleEmailLogin()">
            <span class="btn-spinner" id="loginSpinner"></span>
            <span id="loginBtnLabel">لاگ ان کریں</span>
          </button>
          <button class="forgot-link" id="forgotBtn" onclick="handleForgot()">
            <span id="forgotLabel">پاس ورڈ بھول گئے؟</span>
          </button>
          <div class="or-divider"><span id="orLabel">یا</span></div>
          <button class="btn-google" id="googleLoginBtn" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span id="googleBtnLabel">Google سے جاری رکھیں</span>
          </button>
        </div>

        <!-- SIGNUP panel -->
        <div class="login-panel" id="panelSignup">
          <div class="form-group">
            <label class="form-label" id="lblSignupName">نام</label>
            <input type="text" class="form-input" id="signupName" placeholder="احمد رضا" autocomplete="name">
          </div>
          <div class="form-group">
            <label class="form-label" id="lblSignupEmail">ای میل</label>
            <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" id="lblSignupPw">پاس ورڈ</label>
            <input type="password" class="form-input" id="signupPw" placeholder="کم از کم 6 حروف" autocomplete="new-password">
          </div>
          <button class="btn-email" id="signupBtn" onclick="handleEmailSignup()">
            <span class="btn-spinner" id="signupSpinner"></span>
            <span id="signupBtnLabel">اکاؤنٹ بنائیں</span>
          </button>
          <div class="or-divider"><span id="orLabel2">یا</span></div>
          <button class="btn-google" id="googleSignupBtn" onclick="handleGoogle()">
            <svg class="google-icon" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            <span id="googleSignupBtnLabel">Google سے جاری رکھیں</span>
          </button>
        </div>

      </div><!-- /login-body -->
    </div><!-- /authView -->

    <!-- Footer note -->
    <div class="login-footer" id="loginFooter">
      <span id="footerText">لاگ ان کر کے آپ ہماری</span>
      <a href="about.html" id="footerPrivacy">رازداری پالیسی</a>
      <span id="footerText2">سے متفق ہیں۔</span>
    </div>

  </div><!-- /login-card -->

  <script src="utils.js"></script>
  <script src="firebase.js"></script>
  <script>
    /* ===== TRANSLATIONS ===== */
    const PG = {
      ur: {
        loginTagline: "سگریٹ چھوڑیں — زندگی اپنائیں",
        tabLoginLabel: "لاگ ان", tabSignupLabel: "اکاؤنٹ بنائیں",
        lblLoginEmail: "ای میل", lblLoginPw: "پاس ورڈ",
        loginBtnLabel: "لاگ ان کریں",
        forgotLabel: "پاس ورڈ بھول گئے؟",
        orLabel: "یا", orLabel2: "یا",
        googleBtnLabel: "Google سے جاری رکھیں",
        googleSignupBtnLabel: "Google سے جاری رکھیں",
        lblSignupName: "نام", lblSignupEmail: "ای میل", lblSignupPw: "پاس ورڈ",
        signupBtnLabel: "اکاؤنٹ بنائیں",
        liContinueBtn: "ایپ پر جائیں",
        liSignoutBtn: "لاگ آؤٹ",
        footerText: "لاگ ان کر کے آپ ہماری",
        footerPrivacy: "رازداری پالیسی",
        footerText2: "سے متفق ہیں۔",
        errors: {
          'auth/user-not-found':     'یہ ای میل رجسٹر نہیں — پہلے اکاؤنٹ بنائیں۔',
          'auth/wrong-password':     'پاس ورڈ غلط ہے۔ دوبارہ کوشش کریں۔',
          'auth/email-already-in-use':'یہ ای میل پہلے سے رجسٹر ہے — لاگ ان کریں۔',
          'auth/weak-password':      'پاس ورڈ کم از کم 6 حروف کا ہونا چاہیے۔',
          'auth/invalid-email':      'ای میل درست نہیں۔',
          'auth/popup-closed-by-user':'Google لاگ ان منسوخ ہوا۔',
          'auth/network-request-failed':'انٹرنیٹ کنکشن چیک کریں۔',
          'default':                 'کچھ مسئلہ ہوا۔ دوبارہ کوشش کریں۔',
        },
        forgotSent:  '✓ پاس ورڈ ری سیٹ ای میل بھیجی گئی۔',
        forgotError: 'ای میل درست نہیں یا رجسٹر نہیں۔',
        welcomeBack: 'خوش آمدید واپس! ڈیٹا لوڈ ہو رہا ہے…',
        welcomeNew:  'اکاؤنٹ بن گیا! خوش آمدید 🎉',
      },
      en: {
        loginTagline: "Quit Smoking — Embrace Life",
        tabLoginLabel: "Log In", tabSignupLabel: "Sign Up",
        lblLoginEmail: "Email", lblLoginPw: "Password",
        loginBtnLabel: "Log In",
        forgotLabel: "Forgot password?",
        orLabel: "or", orLabel2: "or",
        googleBtnLabel: "Continue with Google",
        googleSignupBtnLabel: "Continue with Google",
        lblSignupName: "Name", lblSignupEmail: "Email", lblSignupPw: "Password",
        signupBtnLabel: "Create Account",
        liContinueBtn: "Go to App",
        liSignoutBtn: "Sign Out",
        footerText: "By signing in you agree to our",
        footerPrivacy: "Privacy Policy",
        footerText2: ".",
        errors: {
          'auth/user-not-found':      'Email not registered — please sign up first.',
          'auth/wrong-password':      'Incorrect password. Please try again.',
          'auth/email-already-in-use':'Email already in use — please log in.',
          'auth/weak-password':       'Password must be at least 6 characters.',
          'auth/invalid-email':       'Invalid email address.',
          'auth/popup-closed-by-user':'Google sign-in cancelled.',
          'auth/network-request-failed':'Check your internet connection.',
          'default':                  'Something went wrong. Please try again.',
        },
        forgotSent:  '✓ Password reset email sent.',
        forgotError: 'Email not found or invalid.',
        welcomeBack: 'Welcome back! Loading your data…',
        welcomeNew:  'Account created! Welcome 🎉',
      },
    };

    let currentLang = 'ur';

    /* ===== UI HELPERS ===== */
    function showMsg(text, type = 'error') {
      const el = document.getElementById('authMsg');
      el.textContent = text;
      el.className = 'auth-msg show ' + type;
    }
    function hideMsg() {
      document.getElementById('authMsg').classList.remove('show');
    }
    function setLoading(btnId, spinnerId, loading) {
      const btn = document.getElementById(btnId);
      const sp  = document.getElementById(spinnerId);
      btn.disabled = loading;
      sp.style.display = loading ? 'inline-block' : 'none';
    }
    function switchTab(tab) {
      document.getElementById('panelLogin').classList.toggle('active', tab === 'login');
      document.getElementById('panelSignup').classList.toggle('active', tab === 'signup');
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
      hideMsg();
    }

    /* ===== AUTH HANDLERS ===== */
    async function handleEmailLogin() {
      const lang  = currentLang;
      const email = document.getElementById('loginEmail').value.trim();
      const pw    = document.getElementById('loginPw').value;
      if (!email || !pw) { showMsg(PG[lang].errors['auth/invalid-email']); return; }
      setLoading('loginBtn', 'loginSpinner', true);
      hideMsg();
      try {
        const result = await signInWithEmail(email, pw);
        await onLoginSuccess(result.user, false);
      } catch(e) {
        showMsg(PG[lang].errors[e.code] || PG[lang].errors['default']);
      } finally {
        setLoading('loginBtn', 'loginSpinner', false);
      }
    }

    async function handleEmailSignup() {
      const lang  = currentLang;
      const name  = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const pw    = document.getElementById('signupPw').value;
      if (!email)  { showMsg(PG[lang].errors['auth/invalid-email']); return; }
      if (!pw)     { showMsg(PG[lang].errors['auth/weak-password']);  return; }
      if (pw.length < 6) { showMsg(PG[lang].errors['auth/weak-password']); return; }

      // Wait for Firebase to be ready
      if (!_firebaseReady) {
        showMsg(lang === 'ur' ? 'Firebase لوڈ ہو رہا ہے، دوبارہ کوشش کریں' : 'Firebase loading, please try again in a moment');
        return;
      }

      setLoading('signupBtn', 'signupSpinner', true);
      hideMsg();
      try {
        const result = await signUpWithEmail(email, pw);
        if (name) {
          try { await result.user.updateProfile({ displayName: name }); } catch(e) {}
          LS.set('userName', name);
        }
        await onLoginSuccess(result.user, true);
      } catch(e) {
        showMsg(PG[lang].errors[e.code] || PG[lang].errors['default']);
      } finally {
        setLoading('signupBtn', 'signupSpinner', false);
      }
    }

    async function handleGoogle() {
      const lang = currentLang;
      hideMsg();
      try {
        const result = await signInWithGoogle();
        const isNew  = result.additionalUserInfo?.isNewUser;
        await onLoginSuccess(result.user, isNew);
      } catch(e) {
        if (e.code !== 'auth/popup-closed-by-user') {
          showMsg(PG[lang].errors[e.code] || PG[lang].errors['default']);
        }
      }
    }

    async function handleForgot() {
      const lang  = currentLang;
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { showMsg(PG[lang].errors['auth/invalid-email']); return; }
      try {
        await sendPasswordReset(email);
        showMsg(PG[lang].forgotSent, 'success');
      } catch(e) {
        showMsg(PG[lang].forgotError);
      }
    }

    async function handleSignOut() {
      await signOut();
      document.getElementById('loggedInView').style.display = 'none';
      document.getElementById('authView').style.display = 'block';
    }

    /* ===== ON LOGIN SUCCESS ===== */
    async function onLoginSuccess(user, isNew) {
      const lang = currentLang;
      showMsg(isNew ? PG[lang].welcomeNew : PG[lang].welcomeBack, 'success');

      if (!isNew) {
        // Load existing data from Firestore
        await syncFromCloud(user);
      } else {
        // Push local onboarding data to Firestore
        const name = user.displayName || LS.get('userName', '');
        if (name) LS.set('userName', name);
        await syncToCloud(user);
      }

      // Brief delay so user sees success message, then redirect
      setTimeout(() => {
        window.location.href = 'app.html';
      }, 1000);
    }

    /* ===== SHOW LOGGED IN STATE ===== */
    function showLoggedIn(user) {
      const profile = getUserProfile(user);
      document.getElementById('authView').style.display     = 'none';
      document.getElementById('loggedInView').style.display = 'block';

      const avatarEl = document.getElementById('liAvatar');
      if (profile.photo) {
        avatarEl.innerHTML = `<img src="${profile.photo}" alt="avatar">`;
      } else {
        avatarEl.textContent = profile.name ? profile.name[0].toUpperCase() : '👤';
      }
      document.getElementById('liName').textContent  = profile.name  || '—';
      document.getElementById('liEmail').textContent = profile.email || '—';
    }

    /* ===== APPLY TRANSLATIONS ===== */
    function applyTranslations(lang) {
      currentLang = lang;
      const c   = PG[lang];
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('loginTagline', c.loginTagline);
      set('tabLoginLabel', c.tabLoginLabel); set('tabSignupLabel', c.tabSignupLabel);
      set('lblLoginEmail', c.lblLoginEmail); set('lblLoginPw', c.lblLoginPw);
      set('loginBtnLabel', c.loginBtnLabel);
      set('forgotLabel', c.forgotLabel);
      set('orLabel', c.orLabel); set('orLabel2', c.orLabel2);
      set('googleBtnLabel', c.googleBtnLabel);
      set('googleSignupBtnLabel', c.googleSignupBtnLabel);
      set('lblSignupName', c.lblSignupName); set('lblSignupEmail', c.lblSignupEmail);
      set('lblSignupPw', c.lblSignupPw);
      set('signupBtnLabel', c.signupBtnLabel);
      set('liContinueBtn', c.liContinueBtn); set('liSignoutBtn', c.liSignoutBtn);
      set('footerText', c.footerText); set('footerPrivacy', c.footerPrivacy);
      set('footerText2', c.footerText2);

      document.getElementById('btn-ur').classList.toggle('active', lang === 'ur');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }

    /* ===== INIT ===== */
    const savedLang = localStorage.getItem('lang');
    let initLangVal = 'ur';
    try { initLangVal = JSON.parse(savedLang) || 'ur'; } catch(e) {}
    document.documentElement.setAttribute('dir',  initLangVal === 'ur' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', initLangVal);
    document.body.classList.toggle('en-mode', initLangVal === 'en');
    applyTranslations(initLangVal);

    document.getElementById('btn-ur').addEventListener('click', () => {
      LS.set('lang', 'ur');
      document.documentElement.setAttribute('dir', 'rtl');
      document.documentElement.setAttribute('lang', 'ur');
      document.body.classList.remove('en-mode');
      applyTranslations('ur');
    });
    document.getElementById('btn-en').addEventListener('click', () => {
      LS.set('lang', 'en');
      document.documentElement.setAttribute('dir', 'ltr');
      document.documentElement.setAttribute('lang', 'en');
      document.body.classList.add('en-mode');
      applyTranslations('en');
    });

    // Check if already logged in
    onFirebaseReady(() => {
      onAuthChange(user => {
        if (user) showLoggedIn(user);
      });
    });

    // Enter key on password fields
    document.getElementById('loginPw').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleEmailLogin();
    });
    document.getElementById('signupPw').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleEmailSignup();
    });
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    }
  </script>
</body>
</html>
