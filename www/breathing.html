<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="سانس — سانس کی مشق سے خواہش پر قابو پائیں۔" />
  <title>سانس — سانس کی مشق</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    .breathing-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 28px 80px;
    }

    /* ===== TECHNIQUE PICKER ===== */
    .technique-picker {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 36px;
    }
    .technique-btn {
      background: white;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 16px;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    .technique-btn::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--teal));
      transform: scaleX(0);
      transition: transform var(--transition);
    }
    .technique-btn.active {
      border-color: var(--green);
      background: var(--green-xlt);
    }
    .technique-btn.active::before { transform: scaleX(1); }
    .technique-btn:hover { border-color: var(--green-mid); }
    .tb-icon { font-size: 1.8rem; margin-bottom: 8px; display: block; }
    .tb-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .tb-desc { font-size: 0.78rem; color: var(--ink-3); line-height: 1.4; }

    /* ===== CIRCLE AREA ===== */
    .circle-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .breath-ring {
      position: relative;
      width: 260px; height: 260px;
      margin-bottom: 28px;
    }

    /* Outer glow ring */
    .ring-glow {
      position: absolute; inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,122,74,.12) 0%, transparent 70%);
      transition: transform 0s linear;
    }

    /* SVG progress ring */
    .ring-svg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .ring-track {
      fill: none;
      stroke: var(--green-lt);
      stroke-width: 6;
    }
    .ring-progress {
      fill: none;
      stroke: var(--green);
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    }

    /* Inner circle — animates scale */
    .inner-circle {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green-lt) 0%, #d4f0e2 100%);
      border: 2px solid rgba(26,122,74,.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: transform 0s linear, background 0.5s ease;
    }
    .inner-circle.inhale  { background: linear-gradient(135deg, #d4f0e2 0%, #b8e6cc 100%); }
    .inner-circle.hold    { background: linear-gradient(135deg, #e8f5ee 0%, #d4f0e2 100%); }
    .inner-circle.exhale  { background: linear-gradient(135deg, #f3faf6 0%, #e8f5ee 100%); }

    .phase-label {
      font-family: var(--font-disp);
      font-size: 1.3rem;
      color: var(--green);
      text-align: center;
      line-height: 1.2;
    }
    .phase-counter {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--teal);
      font-family: var(--font-en);
      line-height: 1;
    }
    .phase-hint {
      font-size: 0.75rem;
      color: var(--ink-3);
      text-align: center;
      padding: 0 12px;
    }

    /* Cycles counter */
    .cycles-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .cycle-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green-lt);
      border: 1px solid var(--border);
      transition: background 0.3s ease;
    }
    .cycle-dot.done { background: var(--green); border-color: var(--teal); }
    .cycles-label { font-size: 0.8rem; color: var(--ink-3); font-family: var(--font-en); }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .ctrl-btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      border-radius: 999px;
      font-weight: 600;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ctrl-start {
      background: var(--green);
      color: white;
      padding: 14px 36px;
      font-size: 1rem;
    }
    .ctrl-start:hover { background: var(--teal); transform: translateY(-2px); box-shadow: var(--shadow-sm); }
    .ctrl-reset {
      background: var(--bg);
      color: var(--ink-2);
      padding: 13px 22px;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }
    .ctrl-reset:hover { background: var(--green-lt); color: var(--green); border-color: var(--green-mid); }

    /* ===== GUIDE STEPS ===== */
    .guide-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .guide-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--teal));
    }
    .guide-title {
      font-family: var(--font-disp);
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .guide-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .guide-step {
      display: flex;
      align-items: stretch;
      gap: 14px;
      padding: 10px 0;
    }
    .guide-step:last-child .gs-line { display: none; }
    .gs-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }
    .gs-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      flex-shrink: 0;
      font-family: var(--font-en);
    }
    .gs-line {
      width: 2px;
      flex: 1;
      min-height: 16px;
      background: var(--border);
      margin: 4px auto 0;
    }
    .gs-text { padding-top: 6px; }
    .gs-phase { font-size: 0.88rem; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
    .gs-desc  { font-size: 0.8rem; color: var(--ink-3); line-height: 1.5; }

    /* Phase colours */
    .phase-inhale  .gs-dot { background: #d4f0e2; color: var(--green); }
    .phase-hold1   .gs-dot { background: #fef3e2; color: #b8760a; }
    .phase-exhale  .gs-dot { background: #e8f5ee; color: var(--teal); }
    .phase-hold2   .gs-dot { background: #fef3e2; color: #b8760a; }

    /* ===== TIPS CARD ===== */
    .tips-card {
      background: linear-gradient(135deg, var(--green-xlt), #edf7f2);
      border: 1px solid #b8dfc8;
      border-radius: var(--radius-md);
      padding: 22px 20px;
    }
    .tips-card h4 {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .tips-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tips-list li {
      font-size: 0.84rem;
      color: var(--ink-2);
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .tips-list li::before { content: "→"; color: var(--green); flex-shrink: 0; }

    /* ===== COMPLETION BANNER ===== */
    .completion-banner {
      display: none;
      background: linear-gradient(135deg, var(--green), var(--teal));
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      text-align: center;
      color: white;
      margin-bottom: 28px;
      animation: fadeUp 0.5s ease both;
    }
    .completion-banner.show { display: block; }
    .cb-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
    .cb-title { font-family: var(--font-disp); font-size: 1.4rem; margin-bottom: 6px; }
    .cb-sub   { font-size: 0.9rem; color: rgba(255,255,255,.8); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .breathing-wrap { padding: 28px 16px 60px; }
      .breath-ring { width: 220px; height: 220px; }
      .technique-picker { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="mainNav">
    <div class="nav-logo">سانس<span>•</span></div>
    <div class="nav-right">
      <a href="app.html" class="back-btn" id="backBtn">← ہوم</a>
      <a href="settings.html" class="back-btn" title="Settings" id="navSettings" style="padding:8px 10px;">⚙️</a>
      <div class="lang-pill">
        <button class="lang-btn active" id="btn-ur">اردو</button>
        <button class="lang-btn" id="btn-en">English</button>
      </div>
    </div>
  </nav>

  <!-- PAGE HERO -->
  <div class="page-hero">
    <div class="page-hero-inner">
      <div class="page-badge" id="pageBadge">🫁 سانس کی مشق</div>
      <h1 id="pageTitle">پرسکون سانسیں</h1>
      <p id="pageSubtitle">خواہش آئے تو یہ مشق آزمائیں — صرف چند منٹ کافی ہیں</p>
    </div>
  </div>

  <div class="breathing-wrap">

    <!-- Technique picker -->
    <div class="technique-picker">
      <button class="technique-btn active" id="btn478" onclick="selectTechnique('478')">
        <span class="tb-icon">🌙</span>
        <div class="tb-name" id="tb478name">4-7-8</div>
        <div class="tb-desc" id="tb478desc">سانس لیں 4s · روکیں 7s · چھوڑیں 8s</div>
      </button>
      <button class="technique-btn" id="btnBox" onclick="selectTechnique('box')">
        <span class="tb-icon">⬜</span>
        <div class="tb-name" id="tbbname">Box Breathing</div>
        <div class="tb-desc" id="tbBdesc">سانس 4s · روکیں 4s · چھوڑیں 4s · روکیں 4s</div>
      </button>
    </div>

    <!-- Completion banner -->
    <div class="completion-banner" id="completionBanner">
      <span class="cb-icon">🎉</span>
      <div class="cb-title" id="cbTitle">شاباش! مشق مکمل ہوئی</div>
      <div class="cb-sub" id="cbSub">آپ نے خواہش پر قابو پا لیا۔ بہترین!</div>
    </div>

    <!-- Circle -->
    <div class="circle-area">
      <div class="cycles-row" id="cyclesRow"></div>
      <div class="breath-ring" id="breathRing">
        <div class="ring-glow" id="ringGlow"></div>
        <svg class="ring-svg" viewBox="0 0 260 260">
          <circle class="ring-track"    cx="130" cy="130" r="120"/>
          <circle class="ring-progress" cx="130" cy="130" r="120" id="ringProgress"/>
        </svg>
        <div class="inner-circle" id="innerCircle">
          <div class="phase-label"   id="phaseLabel">تیار ہیں؟</div>
          <div class="phase-counter" id="phaseCounter">—</div>
          <div class="phase-hint"    id="phaseHint">شروع کریں</div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn ctrl-start" id="startBtn" onclick="toggleSession()">
        <span id="startIcon">▶</span><span id="startLabel">شروع کریں</span>
      </button>
      <button class="ctrl-btn ctrl-reset" id="resetBtn" onclick="resetSession()">
        <span>↺</span><span id="resetLabel">دوبارہ</span>
      </button>
    </div>

    <!-- Guide steps -->
    <div class="guide-card" id="guideCard">
      <div class="guide-title"><span>📖</span><span id="guideTitle">مشق کا طریقہ</span></div>
      <div class="guide-steps" id="guideSteps"></div>
    </div>

    <!-- Tips -->
    <div class="tips-card">
      <h4><span>💡</span><span id="tipsTitle">مددگار نکات</span></h4>
      <ul class="tips-list" id="tipsList"></ul>
    </div>

  </div>

  <footer>
    <p>© 2025 سانس · پاکستان کے لیے بنایا گیا ❤️</p>
  </footer>

  <script src="utils.js"></script>
  <script>
    /* ===== TRANSLATIONS ===== */
    const PG = {
      ur: {
        backBtn: "← ہوم",
        pageBadge: "🫁 سانس کی مشق",
        pageTitle: "پرسکون سانسیں",
        pageSubtitle: "خواہش آئے تو یہ مشق آزمائیں — صرف چند منٹ کافی ہیں",
        tb478name: "4-7-8 سانس", tb478desc: "سانس لیں 4s · روکیں 7s · چھوڑیں 8s",
        tbbname: "باکس سانس",    tbBdesc:  "سانس 4s · روکیں 4s · چھوڑیں 4s · روکیں 4s",
        startLabel: "شروع کریں", pauseLabel: "روکیں",
        resetLabel: "دوبارہ",
        ready: "تیار ہیں؟", readyHint: "شروع کریں",
        cbTitle: "شاباش! مشق مکمل ہوئی", cbSub: "آپ نے خواہش پر قابو پا لیا۔ بہترین!",
        cyclesLabel: "چکر",
        guideTitle: "مشق کا طریقہ",
        tipsTitle: "مددگار نکات",
        tips: [
          "آرام دہ جگہ بیٹھیں یا لیٹیں۔",
          "ناک سے سانس لیں اور منہ سے چھوڑیں۔",
          "خواہش محسوس ہو تو فوراً یہ مشق شروع کریں۔",
          "4-7-8 نیند کے لیے بھی بہترین ہے۔",
        ],
        techniques: {
          '478': {
            name: "4-7-8 سانس",
            cycles: 4,
            phases: [
              { key:'inhale', label:'سانس لیں',  dur:4, hint:'ناک سے آہستہ سانس لیں',   color:'inhale' },
              { key:'hold1',  label:'روکیں',     dur:7, hint:'سانس روکے رکھیں',         color:'hold1'  },
              { key:'exhale', label:'چھوڑیں',    dur:8, hint:'منہ سے آہستہ چھوڑیں',    color:'exhale' },
            ],
          },
          'box': {
            name: "باکس سانس",
            cycles: 4,
            phases: [
              { key:'inhale', label:'سانس لیں',  dur:4, hint:'ناک سے سانس لیں',         color:'inhale' },
              { key:'hold1',  label:'روکیں',     dur:4, hint:'سانس روکے رکھیں',         color:'hold1'  },
              { key:'exhale', label:'چھوڑیں',    dur:4, hint:'منہ سے چھوڑیں',           color:'exhale' },
              { key:'hold2',  label:'روکیں',     dur:4, hint:'پھر سے روکیں',            color:'hold2'  },
            ],
          },
        },
      },
      en: {
        backBtn: "← Home",
        pageBadge: "🫁 Breathing Exercise",
        pageTitle: "Calm Breathing",
        pageSubtitle: "When a craving hits, try this — just a few minutes is enough",
        tb478name: "4-7-8 Breathing", tb478desc: "Inhale 4s · Hold 7s · Exhale 8s",
        tbbname: "Box Breathing",     tbBdesc:   "Inhale 4s · Hold 4s · Exhale 4s · Hold 4s",
        startLabel: "Start", pauseLabel: "Pause",
        resetLabel: "Reset",
        ready: "Ready?", readyHint: "Press Start",
        cbTitle: "Well done! Exercise complete", cbSub: "You overcame the craving. Excellent!",
        cyclesLabel: "cycles",
        guideTitle: "How It Works",
        tipsTitle: "Helpful Tips",
        tips: [
          "Sit or lie down somewhere comfortable.",
          "Breathe in through your nose, out through your mouth.",
          "Start this exercise as soon as a craving hits.",
          "4-7-8 is also great for falling asleep.",
        ],
        techniques: {
          '478': {
            name: "4-7-8 Breathing",
            cycles: 4,
            phases: [
              { key:'inhale', label:'Inhale',     dur:4, hint:'Breathe in slowly through your nose', color:'inhale' },
              { key:'hold1',  label:'Hold',       dur:7, hint:'Hold your breath gently',             color:'hold1'  },
              { key:'exhale', label:'Exhale',     dur:8, hint:'Breathe out slowly through your mouth',color:'exhale'},
            ],
          },
          'box': {
            name: "Box Breathing",
            cycles: 4,
            phases: [
              { key:'inhale', label:'Inhale',     dur:4, hint:'Breathe in through your nose',        color:'inhale' },
              { key:'hold1',  label:'Hold',       dur:4, hint:'Hold your breath',                    color:'hold1'  },
              { key:'exhale', label:'Exhale',     dur:4, hint:'Breathe out through your mouth',      color:'exhale' },
              { key:'hold2',  label:'Hold',       dur:4, hint:'Hold before the next breath',         color:'hold2'  },
            ],
          },
        },
      },
    };

    /* ===== STATE ===== */
    let currentLang      = 'ur';
    let currentTechnique = '478';
    let running          = false;
    let sessionTimer     = null;
    let phaseTimer       = null;
    let currentCycle     = 0;
    let currentPhaseIdx  = 0;
    let currentCount     = 0;
    let totalCycles      = 4;

    /* ===== CIRCLE RING SETUP ===== */
    const CIRCUMFERENCE = 2 * Math.PI * 120; // r=120
    const ringEl = document.getElementById('ringProgress');
    ringEl.style.strokeDasharray  = CIRCUMFERENCE;
    ringEl.style.strokeDashoffset = CIRCUMFERENCE;

    function setRingProgress(fraction) {
      ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
    }
    function setRingColor(phase) {
      const colors = { inhale:'#1a7a4a', hold1:'#f4a12e', exhale:'#0d6e5e', hold2:'#f4a12e' };
      ringEl.style.stroke = colors[phase] || '#1a7a4a';
    }

    /* ===== INNER CIRCLE SCALE ===== */
    function setCircleScale(phase, fraction) {
      const ic = document.getElementById('innerCircle');
      ic.className = 'inner-circle ' + phase;
      let scale = 1;
      if (phase === 'inhale') scale = 0.85 + fraction * 0.25;        // 0.85 → 1.10
      else if (phase === 'exhale') scale = 1.10 - fraction * 0.25;   // 1.10 → 0.85
      else scale = 1.05; // hold
      ic.style.transform = `scale(${scale})`;
    }

    /* ===== CYCLE DOTS ===== */
    function buildCycleDots(total) {
      const row = document.getElementById('cyclesRow');
      row.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const d = document.createElement('div');
        d.className = 'cycle-dot';
        d.id = 'cdot-' + i;
        row.appendChild(d);
      }
      const lbl = document.createElement('span');
      lbl.className = 'cycles-label';
      lbl.id = 'cyclesLbl';
      lbl.textContent = '0 / ' + total + ' ' + PG[currentLang].cyclesLabel;
      row.appendChild(lbl);
    }
    function updateCycleDots(done) {
      for (let i = 0; i < totalCycles; i++) {
        const d = document.getElementById('cdot-' + i);
        if (d) d.classList.toggle('done', i < done);
      }
      const lbl = document.getElementById('cyclesLbl');
      if (lbl) lbl.textContent = done + ' / ' + totalCycles + ' ' + PG[currentLang].cyclesLabel;
    }

    /* ===== SELECT TECHNIQUE ===== */
    function selectTechnique(key) {
      if (running) resetSession();
      currentTechnique = key;
      document.getElementById('btn478').classList.toggle('active', key === '478');
      document.getElementById('btnBox').classList.toggle('active', key === 'box');
      resetSession();
      buildGuide(currentLang);
    }

    /* ===== SESSION LOGIC ===== */
    function toggleSession() {
      if (running) pauseSession();
      else startSession();
    }

    function startSession() {
      running = true;
      document.getElementById('completionBanner').classList.remove('show');
      const c = PG[currentLang];
      document.getElementById('startIcon').textContent  = '⏸';
      document.getElementById('startLabel').textContent = c.pauseLabel;
      const tech = c.techniques[currentTechnique];
      totalCycles = tech.cycles;
      buildCycleDots(totalCycles);
      updateCycleDots(currentCycle);
      runPhase(currentLang);
    }

    function pauseSession() {
      running = false;
      clearTimeout(phaseTimer);
      const c = PG[currentLang];
      document.getElementById('startIcon').textContent  = '▶';
      document.getElementById('startLabel').textContent = c.startLabel;
    }

    function resetSession() {
      pauseSession();
      currentCycle     = 0;
      currentPhaseIdx  = 0;
      currentCount     = 0;
      document.getElementById('completionBanner').classList.remove('show');
      setRingProgress(0);
      ringEl.style.stroke = 'var(--green)';
      ringEl.style.transition = 'stroke-dashoffset 1s linear';
      const c = PG[currentLang];
      document.getElementById('phaseLabel').textContent   = c.ready;
      document.getElementById('phaseCounter').textContent = '—';
      document.getElementById('phaseHint').textContent    = c.readyHint;
      document.getElementById('innerCircle').className    = 'inner-circle';
      document.getElementById('innerCircle').style.transform = 'scale(1)';
      buildCycleDots(PG[currentLang].techniques[currentTechnique].cycles);
      updateCycleDots(0);
    }

    function runPhase(lang) {
      if (!running) return;
      const tech   = PG[lang].techniques[currentTechnique];
      const phases = tech.phases;

      if (currentCycle >= tech.cycles) {
        // All done
        running = false;
        const c = PG[lang];
        document.getElementById('startIcon').textContent  = '▶';
        document.getElementById('startLabel').textContent = c.startLabel;
        document.getElementById('phaseLabel').textContent   = '🎉';
        document.getElementById('phaseCounter').textContent = '';
        document.getElementById('phaseHint').textContent    = c.cbTitle;
        document.getElementById('completionBanner').classList.add('show');
        setRingProgress(1);
        currentCycle = 0; currentPhaseIdx = 0;
        showToast(lang === 'ur' ? '✓ مشق مکمل! شاباش!' : '✓ Exercise complete! Well done!');
        return;
      }

      const phase    = phases[currentPhaseIdx];
      const duration = phase.dur;
      currentCount   = duration;

      document.getElementById('phaseLabel').textContent   = phase.label;
      document.getElementById('phaseHint').textContent    = phase.hint;
      setRingColor(phase.key);

      function tick() {
        if (!running) return;
        document.getElementById('phaseCounter').textContent = currentCount;
        const fraction = (duration - currentCount + 1) / duration;
        setRingProgress(fraction);
        setCircleScale(phase.key, fraction);

        if (currentCount <= 0) {
          // Next phase
          currentPhaseIdx++;
          if (currentPhaseIdx >= phases.length) {
            currentPhaseIdx = 0;
            currentCycle++;
            updateCycleDots(currentCycle);
          }
          phaseTimer = setTimeout(() => runPhase(lang), 200);
        } else {
          currentCount--;
          phaseTimer = setTimeout(tick, 1000);
        }
      }
      tick();
    }

    /* ===== BUILD GUIDE ===== */
    function buildGuide(lang) {
      const c     = PG[lang];
      const tech  = c.techniques[currentTechnique];
      const steps = document.getElementById('guideSteps');
      steps.innerHTML = '';

      tech.phases.forEach((phase, i) => {
        const div = document.createElement('div');
        div.className = 'guide-step phase-' + phase.key;
        div.innerHTML = `
          <div class="gs-left">
            <div class="gs-dot">${phase.dur}s</div>
            <div class="gs-line"></div>
          </div>
          <div class="gs-text">
            <div class="gs-phase">${phase.label}</div>
            <div class="gs-desc">${phase.hint}</div>
          </div>
        `;
        steps.appendChild(div);
      });
    }

    /* ===== APPLY TRANSLATIONS ===== */
    function applyTranslations(lang) {
      currentLang = lang;
      const c   = PG[lang];
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };

      set('backBtn', c.backBtn);
      set('pageBadge', c.pageBadge);
      set('pageTitle', c.pageTitle);
      set('pageSubtitle', c.pageSubtitle);
      set('tb478name', c.tb478name); set('tb478desc', c.tb478desc);
      set('tbbname', c.tbbname);     set('tbBdesc', c.tbBdesc);
      set('startLabel', running ? c.pauseLabel : c.startLabel);
      set('resetLabel', c.resetLabel);
      set('guideTitle', c.guideTitle);
      set('tipsTitle', c.tipsTitle);
      set('cbTitle', c.cbTitle); set('cbSub', c.cbSub);

      // Tips list
      const tipsList = document.getElementById('tipsList');
      tipsList.innerHTML = '';
      c.tips.forEach(tip => {
        const li = document.createElement('li');
        li.textContent = tip;
        tipsList.appendChild(li);
      });

      // Reset display to idle
      if (!running) {
        set('phaseLabel', c.ready);
        document.getElementById('phaseCounter').textContent = '—';
        set('phaseHint', c.readyHint);
      }

      buildGuide(lang);
      buildCycleDots(c.techniques[currentTechnique].cycles);
      updateCycleDots(currentCycle);
    }

    /* ===== INIT ===== */
    initNavScroll();
    initLang(applyTranslations);
  </script>
  <script src="chat.js"></script>
</body>
</html>
