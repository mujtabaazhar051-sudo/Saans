<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="سانس کوچ — آپ کا ذاتی AI ساتھی" />
  <title>سانس — AI کوچ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* ===== CHAT PAGE LAYOUT ===== */
    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ===== TOP BAR ===== */
    .chat-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow-sm);
    }
    .ct-back {
      color: var(--ink-2); font-size: 0.9rem;
      font-weight: 600; text-decoration: none;
      padding: 6px 12px; border-radius: var(--radius-sm);
      font-family: var(--font-en);
      transition: background var(--transition);
      flex-shrink: 0;
    }
    .ct-back:hover { background: var(--green-lt); color: var(--green); }

    .ct-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--teal));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(26,122,74,.3);
    }
    .ct-info { flex: 1; min-width: 0; }
    .ct-name { font-size: 0.95rem; font-weight: 700; color: var(--ink); }
    .ct-status {
      font-size: 0.72rem; color: var(--green);
      font-family: var(--font-en);
      display: flex; align-items: center; gap: 4px;
    }
    .ct-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    .ct-right {
      display: flex; align-items: center; gap: 8px;
    }
    .ct-clear {
      background: none; border: 1px solid var(--border);
      color: var(--ink-3); font-size: 0.75rem;
      padding: 5px 12px; border-radius: 999px;
      cursor: pointer; font-family: var(--font-en);
      transition: all var(--transition);
    }
    .ct-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* Lang pill in topbar */
    .lang-pill {
      display: flex; background: var(--green-lt);
      border-radius: 999px; padding: 3px; gap: 2px;
    }
    .lang-btn {
      border: none; background: transparent;
      padding: 4px 10px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 500;
      cursor: pointer; color: var(--green);
      font-family: inherit;
      transition: background var(--transition), color var(--transition);
    }
    .lang-btn.active { background: var(--green); color: white; }

    /* ===== MESSAGES AREA ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 76px 16px 100px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }

    /* ===== WELCOME CARD ===== */
    .chat-welcome {
      background: linear-gradient(135deg, var(--green), var(--teal));
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      text-align: center;
      color: white;
      margin-bottom: 8px;
      position: relative; overflow: hidden;
    }
    .chat-welcome::before {
      content: ""; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 28px 28px;
    }
    .cw-inner { position: relative; z-index: 1; }
    .cw-icon  { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    .cw-title { font-family: var(--font-disp); font-size: 1.2rem; color: white; margin-bottom: 6px; }
    .cw-sub   { font-size: 0.82rem; color: rgba(255,255,255,.75); line-height: 1.6; }

    /* Suggestion chips */
    .chat-suggestions {
      display: flex; gap: 8px;
      flex-wrap: wrap; justify-content: center;
      margin-bottom: 8px;
    }
    .sug-chip {
      background: white; border: 1px solid var(--border);
      color: var(--ink-2); padding: 8px 14px;
      border-radius: 999px; font-size: 0.8rem;
      cursor: pointer; font-family: inherit;
      transition: all var(--transition);
      line-height: 1.3; text-align: center;
    }
    .sug-chip:hover { border-color: var(--green); color: var(--green); background: var(--green-xlt); }

    /* ===== MESSAGE BUBBLES ===== */
    .msg {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp 0.3s ease both;
    }
    .msg.user  { flex-direction: row-reverse; }
    .msg.coach { flex-direction: row; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; flex-shrink: 0;
    }
    .msg.coach .msg-avatar {
      background: linear-gradient(135deg, var(--green), var(--teal));
    }
    .msg.user .msg-avatar {
      background: var(--green-lt);
    }

    .msg-bubble {
      max-width: 75%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .msg.user .msg-bubble {
      background: var(--green);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .en-mode .msg.user .msg-bubble { border-bottom-right-radius: 18px; border-bottom-left-radius: 4px; }
    .msg.coach .msg-bubble {
      background: white;
      color: var(--ink);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .en-mode .msg.coach .msg-bubble { border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }

    .msg-time {
      font-size: 0.65rem; color: var(--ink-3);
      font-family: var(--font-en);
      margin-top: 3px;
      text-align: right;
    }
    .en-mode .msg-time { text-align: left; }

    /* Typing indicator */
    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px;
      background: white; border: 1px solid var(--border);
      border-radius: 18px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .en-mode .typing-bubble { border-bottom-left-radius: 18px; border-bottom-right-radius: 4px; }
    .typing-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink-3);
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ===== INPUT BAR ===== */
    .chat-input-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    .chat-textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 0.92rem;
      font-family: inherit;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .chat-textarea:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,122,74,.1);
      background: white;
    }
    .chat-send {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--green); color: white;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
      transition: background var(--transition), transform var(--transition);
    }
    .chat-send:hover { background: var(--teal); transform: scale(1.05); }
    .chat-send:disabled { background: var(--border); cursor: not-allowed; transform: none; }

    /* ===== FLOATING BUBBLE (injected via chat.js) ===== */
    /* Defined here too so chat.html looks consistent */

    /* ===== API KEY NOTICE ===== */
    .api-notice {
      background: #fff8ed; border: 1px solid #f0d89a;
      border-radius: var(--radius-md); padding: 14px 16px;
      font-size: 0.8rem; color: #7a5020;
      line-height: 1.6; margin-bottom: 12px;
      display: none;
    }
    .api-notice.show { display: block; }
    .api-notice strong { color: #8a5c0a; }
    .api-notice a { color: var(--green); font-weight: 600; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .msg-bubble { max-width: 85%; font-size: 0.88rem; }
    }
    .en-mode .chat-topbar   { direction: ltr; }
    .en-mode .chat-input-bar{ direction: ltr; }
    .en-mode .chat-messages { direction: ltr; }
  </style>
</head>
<body class="chat-page">

  <!-- TOP BAR -->
  <div class="chat-topbar">
    <a href="app.html" class="ct-back" id="ctBack">←</a>
    <div class="ct-avatar">🤖</div>
    <div class="ct-info">
      <div class="ct-name" id="ctName">سانس کوچ</div>
      <div class="ct-status">
        <span class="ct-status-dot"></span>
        <span id="ctStatus">آن لائن</span>
      </div>
    </div>
    <div class="ct-right">
      <button class="ct-clear" id="ctClear" onclick="clearChat()">🗑</button>
      <a href="settings.html" class="back-btn" title="Settings" id="navSettings" style="padding:8px 10px;">⚙️</a>
      <div class="lang-pill">
        <button class="lang-btn active" id="btn-ur">اردو</button>
        <button class="lang-btn" id="btn-en">English</button>
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages">

    <!-- Welcome card -->
    <div class="chat-welcome" id="chatWelcome">
      <div class="cw-inner">
        <span class="cw-icon">🤖</span>
        <div class="cw-title" id="cwTitle">سانس کوچ</div>
        <div class="cw-sub" id="cwSub">میں آپ کا ذاتی سگریٹ چھوڑنے کا کوچ ہوں۔ کوئی بھی سوال پوچھیں — خواہش، صحت، حوصلہ یا کچھ بھی۔</div>
      </div>
    </div>

    <!-- API notice -->
    <div class="api-notice" id="apiNotice">
      <strong>⚙️ API Key درکار ہے۔</strong>
      AI کوچ کو فعال کرنے کے لیے <a href="settings.html">ترتیبات</a> میں اپنی Anthropic API key داخل کریں۔
      آپ کی key صرف آپ کے ڈیوائس پر محفوظ رہتی ہے۔
    </div>

    <!-- Suggestions -->
    <div class="chat-suggestions" id="chatSuggestions"></div>

  </div>

  <!-- INPUT BAR -->
  <div class="chat-input-bar">
    <textarea class="chat-textarea" id="chatInput"
      rows="1" placeholder="پیغام لکھیں…" id="chatInput"></textarea>
    <button class="chat-send" id="chatSendBtn" onclick="sendMessage()">➤</button>
  </div>

  <script src="utils.js"></script>
  <script>
    /* ===== TRANSLATIONS ===== */
    const PG = {
      ur: {
        ctBack: "←", ctName: "سانس کوچ", ctStatus: "آن لائن", ctClear: "🗑",
        cwTitle: "سانس کوچ",
        cwSub: "میں آپ کا ذاتی سگریٹ چھوڑنے کا کوچ ہوں۔ کوئی بھی سوال پوچھیں — خواہش، صحت، حوصلہ یا کچھ بھی۔",
        placeholder: "پیغام لکھیں…",
        apiNotice: `<strong>⚙️ API Key درکار ہے۔</strong> AI کوچ کو فعال کرنے کے لیے <a href="settings.html">ترتیبات</a> میں اپنی Anthropic API key داخل کریں۔`,
        suggestions: [
          "مجھے ابھی سگریٹ کی خواہش ہو رہی ہے",
          "آج کتنا اچھا کیا میں نے؟",
          "سگریٹ چھوڑنے کے بعد کیا ہوتا ہے؟",
          "مجھے حوصلہ دیں",
          "craving سے کیسے نپٹوں؟",
        ],
        thinking: "سوچ رہا ہوں…",
        errorMsg: "معذرت، کچھ مسئلہ ہوا۔ دوبارہ کوشش کریں۔",
        clearConfirm: "کیا آپ پوری گفتگو مٹانا چاہتے ہیں؟",
      },
      en: {
        ctBack: "←", ctName: "Saans Coach", ctStatus: "Online", ctClear: "🗑",
        cwTitle: "Saans Coach",
        cwSub: "I'm your personal quit-smoking coach. Ask me anything — cravings, health, motivation, or just to talk.",
        placeholder: "Type a message…",
        apiNotice: `<strong>⚙️ API Key required.</strong> Add your Anthropic API key in <a href="settings.html">Settings</a> to activate the AI coach. Your key is stored only on your device.`,
        suggestions: [
          "I'm craving a cigarette right now",
          "How am I doing today?",
          "What happens after quitting?",
          "Give me some motivation",
          "How do I handle a craving?",
        ],
        thinking: "Thinking…",
        errorMsg: "Sorry, something went wrong. Please try again.",
        clearConfirm: "Clear the entire conversation?",
      },
    };

    /* ===== SYSTEM PROMPT BUILDER ===== */
    function buildSystemPrompt(lang) {
      const name    = LS.get('userName', '');
      const days    = getDaysSinceQuit();
      const streak  = getStreak();
      const savings = getSavings();
      const cigs    = days * (LS.get('cigsPerDay', 20));
      const motiv   = LS.get('motivation', '');
      const decision= LS.get('quitDecision', '');
      const triggers= (LS.get('triggers', []) || []).join(', ');
      const years   = LS.get('smokingYears', '');

      const motivMap = {
        health:'improving health', family:'their family',
        money:'saving money', fitness:'fitness and energy',
        pride:'personal pride', doctor:"doctor's advice",
      };
      const motivStr = motivMap[motiv] || 'quitting smoking';

      if (lang === 'ur') {
        return `آپ "سانس کوچ" ہیں — ایک گرم جوش، حوصلہ افزا اور قابل اعتماد AI کوچ جو پاکستانیوں کو سگریٹ چھوڑنے میں مدد دیتا ہے۔

صارف کی معلومات:
- نام: ${name || 'صارف'}
- سگریٹ چھوڑے: ${days} دن
- موجودہ سٹریک: ${streak} دن
- بچت: PKR ${savings.toLocaleString()}
- بچائے گئے سگریٹ: ${cigs}
- سگریٹ نوشی کے سال: ${years || 'معلوم نہیں'}
- مقصد: ${motivStr}
- فیصلہ: ${decision || 'معلوم نہیں'}
- محرکات: ${triggers || 'معلوم نہیں'}

ہدایات:
- ہمیشہ اردو میں جواب دیں جب تک صارف انگریزی میں نہ لکھے
- گرم جوش، مثبت اور حوصلہ افزا لہجہ اپنائیں
- مختصر جوابات دیں (2-4 جملے عام طور پر کافی ہیں)
- صارف کا نام استعمال کریں جب مناسب ہو
- سگریٹ چھوڑنے، صحت، خواہش سے نپٹنے، اور حوصلے پر توجہ رکھیں
- اگر کوئی طبی ایمرجنسی ہو تو 1122 یا ڈاکٹر سے رجوع کرنے کا مشورہ دیں
- کبھی سگریٹ پینے کی ترغیب نہ دیں
- ایموجی مناسب مقدار میں استعمال کریں`;
      } else {
        return `You are "Saans Coach" — a warm, motivational and trustworthy AI coach helping Pakistanis quit smoking.

User information:
- Name: ${name || 'User'}
- Days smoke-free: ${days}
- Current streak: ${streak} days
- Money saved: PKR ${savings.toLocaleString()}
- Cigarettes avoided: ${cigs}
- Years smoked: ${years || 'unknown'}
- Motivation: ${motivStr}
- Decision: ${decision || 'unknown'}
- Triggers: ${triggers || 'unknown'}

Instructions:
- Always respond in English when the user writes in English
- Use a warm, positive, encouraging tone
- Keep responses concise (2-4 sentences is usually enough)
- Use the user's name when appropriate
- Stay focused on quitting smoking, health, handling cravings, and motivation
- For medical emergencies, recommend calling 1122 or seeing a doctor
- Never encourage smoking
- Use emojis in moderation`;
      }
    }

    /* ===== STATE ===== */
    let conversationHistory = [];
    let isLoading = false;
    let currentLang = 'ur';

    /* ===== LOAD / SAVE HISTORY ===== */
    function loadHistory() {
      conversationHistory = LS.get('chatHistory', []);
    }
    function saveHistory() {
      // Keep last 40 messages to avoid localStorage bloat
      if (conversationHistory.length > 40) conversationHistory = conversationHistory.slice(-40);
      LS.set('chatHistory', conversationHistory);
    }

    /* ===== RENDER MESSAGES ===== */
    function renderMessages() {
      const container = document.getElementById('chatMessages');
      // Remove old message bubbles (keep welcome, notice, suggestions)
      container.querySelectorAll('.msg').forEach(el => el.remove());

      conversationHistory.forEach(msg => {
        appendBubble(msg.role === 'user' ? 'user' : 'coach', msg.content, false);
      });
      scrollToBottom();
    }

    function appendBubble(role, text, save = true) {
      const container = document.getElementById('chatMessages');
      const sugs = document.getElementById('chatSuggestions');

      // Hide suggestions after first message
      if (save && role === 'user') sugs.style.display = 'none';

      const now  = new Date();
      const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      const isUser = role === 'user';
      const avatarEmoji = isUser ? '👤' : '🤖';

      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <div class="msg-avatar">${avatarEmoji}</div>
        <div>
          <div class="msg-bubble">${escapeHtml(text)}</div>
          <div class="msg-time">${time}</div>
        </div>
      `;
      container.appendChild(div);

      if (save) {
        conversationHistory.push({ role: isUser ? 'user' : 'assistant', content: text });
        saveHistory();
      }
      scrollToBottom();
    }

    function showTyping() {
      const container = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = 'msg coach';
      div.id = 'typingIndicator';
      div.innerHTML = `
        <div class="msg-avatar">🤖</div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      `;
      container.appendChild(div);
      scrollToBottom();
    }

    function hideTyping() {
      const el = document.getElementById('typingIndicator');
      if (el) el.remove();
    }

    function scrollToBottom() {
      const container = document.getElementById('chatMessages');
      container.scrollTop = container.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    /* ===== SEND MESSAGE ===== */
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const text  = input.value.trim();
      if (!text || isLoading) return;

      const apiKey = LS.get('anthropicApiKey', '');
      if (!apiKey) {
        document.getElementById('apiNotice').classList.add('show');
        showToast(currentLang === 'ur' ? '⚙️ API key درکار ہے — ترتیبات دیکھیں' : '⚙️ API key required — check Settings');
        return;
      }

      input.value = '';
      input.style.height = 'auto';
      appendBubble('user', text);

      isLoading = true;
      document.getElementById('chatSendBtn').disabled = true;
      showTyping();

      try {
        const systemPrompt = buildSystemPrompt(currentLang);
        const messages = conversationHistory.slice(0, -1).map(m => ({
          role: m.role, content: m.content
        }));
        // Add current message
        messages.push({ role: 'user', content: text });

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1024,
            system: systemPrompt,
            messages: messages,
          }),
        });

        const data = await response.json();
        hideTyping();

        if (data.content && data.content[0] && data.content[0].text) {
          appendBubble('coach', data.content[0].text);
        } else if (data.error) {
          appendBubble('coach', PG[currentLang].errorMsg + (data.error.message ? ' (' + data.error.message + ')' : ''));
        } else {
          appendBubble('coach', PG[currentLang].errorMsg);
        }
      } catch (err) {
        hideTyping();
        appendBubble('coach', PG[currentLang].errorMsg);
        console.error('Chat error:', err);
      } finally {
        isLoading = false;
        document.getElementById('chatSendBtn').disabled = false;
        input.focus();
      }
    }

    /* ===== CLEAR CHAT ===== */
    function clearChat() {
      const lang = currentLang;
      if (!confirm(PG[lang].clearConfirm)) return;
      conversationHistory = [];
      LS.remove('chatHistory');
      document.querySelectorAll('.msg').forEach(el => el.remove());
      document.getElementById('chatSuggestions').style.display = 'flex';
    }

    /* ===== SUGGESTIONS ===== */
    function buildSuggestions(lang) {
      const wrap = document.getElementById('chatSuggestions');
      wrap.innerHTML = '';
      PG[lang].suggestions.forEach(sug => {
        const chip = document.createElement('button');
        chip.className = 'sug-chip';
        chip.textContent = sug;
        chip.addEventListener('click', () => {
          document.getElementById('chatInput').value = sug;
          sendMessage();
        });
        wrap.appendChild(chip);
      });
    }

    /* ===== AUTO-GROW TEXTAREA ===== */
    document.getElementById('chatInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    /* ===== APPLY TRANSLATIONS ===== */
    function applyTranslations(lang) {
      currentLang = lang;
      const c   = PG[lang];
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      set('ctBack',   c.ctBack);
      set('ctName',   c.ctName);
      set('ctStatus', c.ctStatus);
      set('cwTitle',  c.cwTitle);
      set('cwSub',    c.cwSub);
      document.getElementById('chatInput').placeholder = c.placeholder;
      document.getElementById('apiNotice').innerHTML   = c.apiNotice;

      // Check API key
      const hasKey = !!LS.get('anthropicApiKey', '');
      document.getElementById('apiNotice').classList.toggle('show', !hasKey);

      buildSuggestions(lang);
      renderMessages();
    }

    /* ===== INIT ===== */
    loadHistory();
    initLang(applyTranslations);
  </script>
</body>
</html>
